<!DOCTYPE html>
<html>
<head>
    <title>TV Display</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: black; color: white; overflow: hidden; font-family: sans-serif; }
        #display { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        img { max-width: 80%; max-height: 70%; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="display">
        <h1>รอรับข้อความ...</h1>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');

        // ฟังการเปลี่ยนแปลงใน Database แบบ Realtime
        supabase
            .channel('ads_display')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'ads_display', filter: 'status=eq.paid' }, 
            payload => {
                showAd(payload.new);
            })
            .subscribe();

        function showAd(ad) {
            const display = document.getElementById('display');
            display.innerHTML = `
                <img src="${ad.image_url}">
                <h2>${ad.message}</h2>
                <p>เวลาที่เหลือ: <span id="timer">--:--</span></p>
            `;
            // เพิ่ม Logic นับถอยหลังตรงนี้ได้
        }
    </script>
</body>
</html>
