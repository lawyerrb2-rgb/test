<!DOCTYPE html>
<html lang="th">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งรูปขึ้นจอ TV By M Group</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
    --primary-color: #4f46e5;
    --primary-hover: #4338ca;
    --bg-color: #f3f4f6;
    --card-bg: #ffffff;
}

body {
    font-family: 'Kanit', sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 20px;
}
/* จัดการกรอบด้านนอกให้รองรับ Banner แบบชิดขอบ */
.container {
    padding-top: 0; /* เอา padding บนออกเพื่อให้รูปชิดขอบ */
    overflow: hidden; /* เพื่อให้รูป Banner ที่มุมโค้งไม่ทะลุออกมา */
}

/* สไตล์สำหรับ Banner ส่วนหัว */
.header-banner {
    width: calc(100% + 60px); /* ขยายให้ชิดขอบ padding ของ container */
    margin-left: -30px;
    margin-right: -30px;
    height: 150px; /* ปรับความสูงตามต้องการ */
    overflow: hidden;
}

#main-banner {
    width: 100%;
    height: 100%;
    object-fit: cover; /* ให้รูปเต็มกรอบโดยไม่เสียสัดส่วน */
}

/* สไตล์สำหรับโลโก้ */
.logo-wrapper {
    display: flex;
    justify-content: center;
    margin-top: -40px; /* ให้โลโก้ลอยทับ Banner ขึ้นไปนิดนึง (ถ้าต้องการ) */
    margin-bottom: 15px;
}

#my-logo {
    width: 80px; /* ปรับขนาดโลโก้ */
    height: 80px;
    border-radius: 50%; /* ทำเป็นวงกลม */
    border: 4px solid white; /* เพิ่มขอบขาวให้ดูเด่น */
    background-color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    object-fit: contain;
}

/* ปรับ h2 ให้ระยะห่างพอดี */
h2 {
    margin-top: 10px;
    font-size: 1.4rem;
}

.container {
    width: 100%;
    max-width: 450px;
    background: var(--card-bg);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
h1 {
    text-align: center;
    color: #1f2937;
    margin-bottom: 3px;
    font-size: 1rem;
}
h2 {
    text-align: center;
    color: #1f2937;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #374151;
}

input[type="text"], select {
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 16px;
}

input[type="file"] {
    display: none; /* ซ่อนปุ่มเดิมที่ดูเชย */
}

.custom-file-upload {
    border: 2px dashed #4f46e5;
    display: block;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    border-radius: 10px;
    color: #4f46e5;
    font-weight: bold;
    transition: all 0.3s;
}

.custom-file-upload:hover {
    background: #eef2ff;
}

#preview-img {
    width: 100%;
    border-radius: 10px;
    margin-top: 15px;
    display: none; /* ซ่อนจนกว่าจะเลือกรูป */
}

button {
    width: 100%;
    padding: 15px;
    background-color: var(--primary-color);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background-color: var(--primary-hover);
}

#status {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    color: #6b7280;
}

/* ส่วนของ QR Code */
#qr-container {
    margin-top: 25px;
    text-align: center;
    padding: 20px;
    border-top: 2px solid #f3f4f6;
    display: none;
}
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <img src="https://zossrpbtdszdntgbqcfe.supabase.co/storage/v1/object/public/assets/asd.png" alt="Banner" id="main-banner">
    </div>

    <div class="logo-wrapper">
        <img src="https://zossrpbtdszdntgbqcfe.supabase.co/storage/v1/object/public/assets/icon2.ico" alt="Logo" id="my-logo">
    </div>
    <h1>โรงน้ำแข็งหลอด ดีเค ระยอง</h1>
    <h2>🚀 ส่งโฆษณาขึ้นจอ TV</h2>

    <div class="form-group">
        <label>1. เลือกรูปภาพโฆษณา</label>
        <label for="imageInput" class="custom-file-upload">
            📁 กดเพื่อเลือกรูปภาพ
        </label>
        <input type="file" id="imageInput" accept="image/*" onchange="previewFile()">
        <img id="preview-img" src="">
    </div>

    <div class="form-group">
        <label>2. ข้อความบรรยายใต้ภาพ</label>
        <input type="text" id="messageInput" placeholder="เช่น รักนะเด็กโง่...">
    </div>

    <div class="form-group">
        <label>3. เลือกระยะเวลาการแสดง</label>
        <select id="durationInput">
            <option value="15">15 วินาที (20 บาท)</option>
            <option value="30">30 วินาที (35 บาท)</option>
            <option value="60">60 วินาที (65 บาท)</option>
        </select>
    </div>

    <button onclick="startProcess()">ชำระเงินและส่งโฆษณา</button>

    <div id="status"></div>

    <div id="qr-container">
        <h3>สแกนเพื่อจ่ายเงิน <span id="amount-text"></span> บาท</h3>
        <img id="qr-image" src="" alt="QR Code">
        <p style="color: #ef4444; font-size: 12px; margin-top: 10px;">
            *รูปจะขึ้นจอทันทีหลังการชำระเงินได้รับการยืนยัน
        </p>
    </div>
</div>

<script>
    function previewFile() {
    const preview = document.getElementById('preview-img');
    const file = document.getElementById('imageInput').files[0];
    const reader = new FileReader();

    reader.onloadend = function () {
        preview.src = reader.result;
        preview.style.display = 'block';
    }

    if (file) {
        reader.readAsDataURL(file);
    } else {
        preview.src = "";
        preview.style.display = 'none';
    }
}
    // ใส่ค่าจริงจาก Supabase ของคุณที่นี่
    const SB_URL = 'https://zossrpbtdszdntgbqcfe.supabase.co';
    const SB_KEY = 'sb_publishable_7vCBrHCs7cx3uVDDT_SHJA_HVlc1xt9';
    const supabaseClient = supabase.createClient('SB_URL', 'SB_KEY');

    async function startProcess() {
        const fileInput = document.getElementById('imageInput');
        const message = document.getElementById('messageInput').value;
        const duration = document.getElementById('durationInput').value;
        const statusText = document.getElementById('status');

        if (!fileInput.files[0] || !message) {
            alert('กรุณาเลือกรูปและใส่ข้อความด้วยครับ');
            return;
        }

        statusText.innerText = "กำลังอัปโหลดรูป...";

        // 1. อัปโหลดรูปไปที่ Supabase Storage
        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        const { data: storageData, error: storageError } = await supabaseClient.storage
            .from('ads-images') // ชื่อ Bucket ที่คุณสร้างไว้
            .upload(fileName, file);

        if (storageError) {
            statusText.innerText = "อัปโหลดรูปไม่สำเร็จ: " + storageError.message;
            return;
        }

        // 2. ดึง Public URL ของรูป
        const { data: urlData } = supabaseClient.storage.from('ads-images').getPublicUrl(fileName);
        const imageUrl = urlData.publicUrl;

        // 3. บันทึกข้อมูลลงตาราง (สถานะ pending)
        const { data: adData, error: dbError } = await supabaseClient
            .from('ads_display')
            .insert([{ 
                image_url: imageUrl, 
                message: message, 
                duration_minutes: parseInt(duration),
                status: 'pending' 
            }])
            .select()
            .single();

        if (dbError) {
            statusText.innerText = "เกิดข้อผิดพลาดในการบันทึกข้อมูล";
            return;
        }

        // 4. แสดง QR Code (ในขั้นตอนนี้เราจำลองการดึง QR จาก Backend)
        statusText.innerText = "สร้างรายการสำเร็จ!";
        showQR(adData.id, duration);
    }

    function showQR(adId, duration) {
        document.getElementById('qr-container').style.display = 'block';
        document.getElementById('amount-text').innerText = (duration == 10 ? 20 : duration == 30 ? 50 : 90);
        
        // ตรงนี้ในระบบจริง คุณต้องเรียก API /api/generate-qr ของคุณ
        // แต่เพื่อการทดสอบ ให้ลองนึกภาพว่ามันโชว์ QR ของคุณที่นี่
        document.getElementById('qr-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=TEST_PAYMENT_" + adId;
    }
</script>

</body>
</html>
