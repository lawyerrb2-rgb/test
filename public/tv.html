<!DOCTYPE html>
<html>
<head>
    <title>TV Display</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: black; color: white; overflow: hidden; font-family: sans-serif; }
        #display { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        img { max-width: 80%; max-height: 70%; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="display-container">
    <img id="ad-image" src="" style="max-width: 100%; height: auto; display: none;">
    
    <h1 id="ad-message">รอรับข้อความ...</h1>
</div>

    <script>
    const SB_URL = 'https://zossrpbtdszdntgbqcfe.supabase.co';
    const SB_KEY = 'sb_publishable_7vCBrHCs7cx3uVDDT_SHJA_HVlc1xt9';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        // เริ่มการฟัง (Listen) ข้อมูลที่เปลี่ยนแปลง
const channels = supabaseClient.channel('custom-all-channel')
.on(
  'postgres_changes',
  { event: 'UPDATE', schema: 'public', table: 'ads_display' }, // ตรวจสอบชื่อตารางให้ตรง
  (payload) => {
    console.log('Change received!', payload);
    // ตรวจสอบว่าถ้าสถานะเปลี่ยนเป็น paid ให้แสดงรูป
    if (payload.new.status === 'paid') {
      displayImage(payload.new.image_url, payload.new.message);
    }
  }
)
       .subscribe();

function displayImage(url, msg) {
    const imgElement = document.getElementById('ad-image');
    const msgElement = document.getElementById('ad-message');
    
    if (imgElement && msgElement) {
        imgElement.src = url;
        imgElement.style.display = 'block'; // แสดงรูปภาพ (เผื่อตอนแรกซ่อนไว้)
        msgElement.innerText = msg;
        console.log("แสดงรูปเรียบร้อยแล้ว:", url);
    } else {
        console.error("หา Element 'ad-image' หรือ 'ad-message' ไม่เจอในหน้า HTML");
    }
}
    </script>
</body>
</html>
