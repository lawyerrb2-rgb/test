<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Advertising Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #ffcc00;
            --text-white: #ffffff;
            --overlay-bg: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            color: var(--text-white);
        }

        /* รูปพื้นหลังที่สลับไปมา */
        #bg-image-default {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -1;
            transition: opacity 1.5s ease-in-out;
            filter: brightness(0.5);
        }

        /* รูปโฆษณาหลัก */
        #ad-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: contain;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        /* แถบข้อมูล */
        .info-bar {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: var(--overlay-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 40px;
            border-radius: 25px;
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะมีโฆษณา */
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        #ad-message { font-size: 2.5rem; margin: 0; }
        #time-left { font-size: 3.5rem; font-weight: bold; color: var(--primary-color); }

        #next-queue-bar {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            z-index: 20;
        }
    </style>
</head>
<body>

    <img id="bg-image-default" src="" alt="Background">
    <div id="next-queue-bar">คิวถัดไป: <span id="next-msg">ว่าง</span></div>
    <img id="ad-image" src="" alt="Advertising">

    <div class="info-bar" id="info-overlay">
        <div class="message-section">
            <p id="ad-message">ยินดีต้อนรับ</p>
        </div>
        <div class="timer-section" style="text-align:right;">
            <div style="font-size: 1rem; color: #aaa;">เหลือเวลา</div>
            <span id="time-left">00:00</span>
        </div>
    </div>

<script>
    // 1. ตั้งค่า Supabase
    const SB_URL = 'https://zossrpbtdszdntgbqcfe.supabase.co';
    const SB_KEY = 'sb_publishable_7vCBrHCs7cx3uVDDT_SHJA_HVlc1xt9';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // 2. ตั้งค่ารูปพื้นหลัง
    const BUCKET_NAME = 'backgrounds';
    let bgImages = [];
    let currentBgIndex = 0;
    let timerInterval;

    // --- ฟังก์ชันจัดการรูปพื้นหลัง ---
    async function fetchBackgroundImages() {
        const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list();
        if (data) {
            bgImages = data.map(file => supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(file.name).data.publicUrl);
            rotateBackground();
        }
    }

    function rotateBackground() {
        const bgElement = document.getElementById('bg-image-default');
        if (bgImages.length > 0) {
            bgElement.style.opacity = 0;
            setTimeout(() => {
                bgElement.src = bgImages[currentBgIndex];
                bgElement.style.opacity = 1;
                currentBgIndex = (currentBgIndex + 1) % bgImages.length;
            }, 1500);
        }
    }

    // --- ฟังก์ชันจัดการนาฬิกาถอยหลัง ---
    function startTimer(expiresAt) {
        clearInterval(timerInterval);
        const expireDate = new Date(expiresAt).getTime();

        timerInterval = setInterval(() => {
            const now = new Date().getTime();
            const distance = expireDate - now;

            if (distance <= 0) {
                clearInterval(timerInterval);
                document.getElementById('ad-image').style.opacity = 0;
                document.getElementById('info-overlay').style.display = 'none';
                updateQueue(); // ตรวจหาคิวถัดไปทันที
            } else {
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById('time-left').innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            }
        }, 1000);
    }

    // --- ฟังก์ชันหลักในการคุมคิว ---
    async function updateQueue() {
        const nowIso = new Date().toISOString();

        // 1. เช็คว่ามีโฆษณาที่กำลังฉายอยู่ไหม
        const { data: currentAds } = await supabaseClient
            .from('ads_display')
            .select('*')
            .eq('status', 'paid')
            .lte('started_at', nowIso)
            .gt('expires_at', nowIso)
            .limit(1);

        if (currentAds && currentAds.length > 0) {
            const ad = currentAds[0];
            const imgElement = document.getElementById('ad-image');
            if (imgElement.src !== ad.image_url) {
                imgElement.src = ad.image_url;
                imgElement.style.opacity = 1;
                document.getElementById('ad-message').innerText = ad.message;
                document.getElementById('info-overlay').style.display = 'flex';
                startTimer(ad.expires_at);
            }
        } else {
            // 2. ถ้าไม่มีโฆษณาฉายอยู่ ให้เช็คว่ามีคิวใหม่ที่รอเริ่มไหม
            checkAndStartNextQueue();
        }

        // 3. อัปเดตชื่อคิวถัดไป (UI เท่านั้น)
        updateNextQueueLabel();
    }

    async function checkAndStartNextQueue() {
        const { data: nextInLine } = await supabaseClient
            .from('ads_display')
            .select('*')
            .eq('status', 'paid')
            .is('started_at', null)
            .order('created_at', { ascending: true })
            .limit(1);

        if (nextInLine && nextInLine.length > 0) {
            const ad = nextInLine[0];
            const durationSec = parseInt(ad.duration_minutes); // เราเปลี่ยนเป็นวินาทีแล้ว
            const startTime = new Date();
            const expireTime = new Date(startTime.getTime() + (durationSec * 1000));

            // อัปเดต Database เพื่อเริ่มนับเวลา
            await supabaseClient
                .from('ads_display')
                .update({ 
                    started_at: startTime.toISOString(), 
                    expires_at: expireTime.toISOString() 
                })
                .eq('id', ad.id);

            // แสดงผลทันทีโดยไม่ต้อง Refresh
            updateQueue();
        } else {
            // ไม่มีคิวเหลือเลย
            document.getElementById('ad-image').style.opacity = 0;
            document.getElementById('info-overlay').style.display = 'none';
        }
    }

    async function updateNextQueueLabel() {
        const { data } = await supabaseClient
            .from('ads_display')
            .select('message')
            .eq('status', 'paid')
            .is('started_at', null)
            .order('created_at', { ascending: true })
            .limit(1);
        
        document.getElementById('next-msg').innerText = (data && data.length > 0) ? data[0].message : "ว่าง";
    }

    // เริ่มทำงาน
    fetchBackgroundImages();
    setInterval(rotateBackground, 60000); // สลับพื้นหลังทุก 1 นาที
    setInterval(updateQueue, 5000); // เช็คคิวใหม่จาก DB ทุก 5 วินาที
    updateQueue();

</script>
</body>
</html>
