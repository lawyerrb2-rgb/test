<!DOCTYPE html>
<html>
<head>
    <title>TV Display</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
    --primary-color: #ffcc00;
    --text-white: #ffffff;
    --overlay-bg: rgba(0, 0, 0, 0.6);
}
/* รูปพื้นหลังเริ่มต้น */
#bg-image-default {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover; /* ให้รูปเต็มจอโดยไม่เสียสัดส่วน */
    z-index: -1;        /* อยู่ชั้นล่างสุดเสมอ */
    transition: opacity 1.5s ease-in-out; /* ปรับเวลาให้นุ่มนวลขึ้น */
    filter: brightness(0.5); /* ปรับให้มืดลงเพื่อให้ข้อความโฆษณาอ่านง่าย */
    background-color: #000; /* สีพื้นหลังระหว่างรอโหลดรูป */
    display: block
}
/* วิดีโอพื้นหลัง */
#bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1; /* อยู่ชั้นล่างสุด */
    object-fit: cover;
}

body {
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: 'Kanit', sans-serif;
    overflow: hidden;
    color: var(--text-white);
}

        /* พื้นที่แสดงรูปภาพหลัก */
#ad-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* ปรับให้เห็นรูปโฆษณาครบถ้วน */
    z-index: 10; /* อยู่เหนือวิดีโอ */
    background-color: transparent; /* สำคัญ: ต้องโปร่งใสเพื่อให้เห็นวิดีโอข้างหลัง (ถ้าต้องการ) */
    display: none; /* ซ่อนไว้ก่อน */
}
/* แถบข้อมูลด้านล่าง (Glassmorphism) */
.info-bar {
    z-index: 20; /* อยู่บนสุด */
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    background: var(--overlay-bg);
    backdrop-filter: blur(10px); /* เอฟเฟกต์กระจกฝ้า */
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 20px 40px;
    border-radius: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}
/*ส่วนแสดงข้อความ*/
.message-section {
    flex: 1;
}

#ad-message {
    font-size: 2.5rem;
    margin: 0;
    font-weight: 500;
    letter-spacing: 1px;
}


/* ตัวนับเวลาถอยหลัง */
.timer-section {
    text-align: right;
    border-left: 2px solid var(--primary-color);
    padding-left: 30px;
}

#time-left {
    font-size: 3.5rem;
    font-weight: bold;
    color: var(--primary-color);
    display: block;
    line-height: 1;
}

.label {
    font-size: 1rem;
    text-transform: uppercase;
    color: #aaa;
}
/* คิวถัดไป */
#next-queue-bar {
    z-index: 20; /* อยู่บนสุด */
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 1.2rem;
    border: 1px solid rgba(255,255,255,0.1);
}
#status-bar {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 15px;
    border-radius: 10px;
    font-size: 1.5rem;
    font-family: sans-serif;
    z-index: 100;
}
    </style>
</head>
<body>
    <img id="bg-image-default" src="" alt="Background">

    <div id="next-queue-bar">
        <span class="label">คิวถัดไป:</span> <span id="next-msg">รอรับโฆษณา...</span>
    </div>

    <div id="display-container">
        <img id="ad-image" src="" style="max-width: 100%; height: auto; display: none;">
    </div>
    <div class="info-bar" id="info-overlay">
        <div class="message-section">
        <p id="ad-message">ยินดีต้อนรับสู่ร้านของเรา</p>
    </div>

    <div class="timer-section">
        <span class="label">เหลือเวลา</span>
        <span id="time-left">000</span>
    </div>



</div>
    <script>
    const SB_URL = 'https://zossrpbtdszdntgbqcfe.supabase.co';
    const SB_KEY = 'sb_publishable_7vCBrHCs7cx3uVDDT_SHJA_HVlc1xt9';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    //ประกาศฟังก์ชัน
let countdownInterval;

// 1. ตั้งค่าเบื้องต้น
const BUCKET_NAME = 'backgrounds';
let bgImages = []; // ปล่อยว่างไว้ก่อน เดี๋ยวเราจะดึงมาใส่
let currentBgIndex = 0;

// 2. ฟังก์ชันดึงรายชื่อรูปภาพทั้งหมดจาก Supabase Storage
async function fetchBackgroundImages() {
    try {
        console.log("กำลังดึงรายชื่อรูปภาพจาก Bucket:", BUCKET_NAME);
        
        const { data, error } = await supabaseClient
            .storage
            .from(BUCKET_NAME)
            .list('', {
                limit: 100,
                offset: 0,
                sortBy: { column: 'name', order: 'asc' },
            });

        if (error) {
            console.error("Supabase Error:", error.message);
            return;
        }

        if (!data || data.length === 0) {
            console.warn("ไม่พบไฟล์ใน Bucket นี้ หรือยังไม่ได้ตั้งค่า Policy");
            return;
        }

        console.log("พบไฟล์ทั้งหมด:", data.length, "ไฟล์");

        bgImages = data
            .filter(file => file.name !== '.emptyFolderPlaceholder') // กรองไฟล์ขยะออก
            .map(file => {
                const { data: urlData } = supabaseClient
                    .storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(file.name);
                return urlData.publicUrl;
            });

        console.log("รายการ URL ที่พร้อมใช้งาน:", bgImages);
        rotateBackground(); 

    } catch (err) {
        console.error("System Error:", err);
    }
}

// 3. ฟังก์ชันสลับรูป (เหมือนเดิม แต่เพิ่มเช็คเงื่อนไขเล็กน้อย)
function rotateBackground() {
    const bgElement = document.getElementById('bg-image-default');
    if (!bgElement || bgImages.length === 0) return;

    // 1. ลองใส่ URL รูปแรกเข้าไปเลย
    bgElement.src = bgImages[currentBgIndex];

    // 2. บังคับให้แสดงผล (เผื่อ CSS ไปสั่งซ่อนไว้)
    bgElement.style.display = 'block'; 
    bgElement.style.opacity = '1';
    bgElement.style.zIndex = '-1'; // มั่นใจว่าอยู่หลังสุด

    // เลื่อนลำดับรูปถัดไป
    currentBgIndex = (currentBgIndex + 1) % bgImages.length;
}

// 4. สั่งให้ทำงาน
fetchBackgroundImages(); // ดึงรูปภาพตอนโหลดหน้าครั้งแรก
setInterval(rotateBackground, 30000); // สลับรูปทุก 1 นาที
setInterval(fetchBackgroundImages, 300000); // อัปเดตรายชื่อรูปใหม่ทุก 5 นาที (เผื่อคุณอัปโหลดรูปเพิ่ม)

// ฟังก์ชันดึงข้อมูลคิวทั้งหมด
async function updateQueue() {
    // 1. หาโฆษณาที่กำลังฉาย (มี started_at และยังไม่หมดเวลา)
    const nowIso = new Date().toISOString();
    const { data: currentAds } = await supabaseClient
        .from('ads_display')
        .select('*')
        .eq('status', 'paid')
        .lte('started_at', nowIso) // เริ่มไปแล้ว
        .gt('expires_at', nowIso)   // ยังไม่หมดอายุ
        .limit(1);

    if (currentAds && currentAds.length > 0) {
        // มีรูปกำลังฉายอยู่ -> แสดงรูปและเริ่มนับถอยหลัง
        displayImage(currentAds[0].image_url, currentAds[0].message);
        startTimer(currentAds[0].expires_at);
    } else {
        // ไม่มีรูปฉายอยู่ หรือรูปเก่าหมดเวลาแล้ว -> ไปดึงคิวใหม่มาเริ่ม
        checkAndStartNextQueue();
    }

    // --- ส่วนที่ 2: ดึงโฆษณา "คิวถัดไป" (จ่ายแล้วแต่ยังไม่ได้เริ่ม) ---
    const { data: nextAds } = await supabaseClient
        .from('ads_display')
        .select('message') // ดึงมาแค่ข้อความพอ
        .eq('status', 'paid')
        .is('started_at', null) // ยังไม่มีเวลาเริ่ม = ยังไม่เคยฉาย
        .order('created_at', { ascending: true }) // เอาคิวที่เก่าที่สุดก่อน
        .limit(1);

    const nextMsgElement = document.getElementById('next-msg');
    if (nextMsgElement) {
        if (nextAds && nextAds.length > 0) {
            // ถ้ามีคิวถัดไป ให้โชว์ข้อความของคิวนั้น
            nextMsgElement.innerText = nextAds[0].message;
        } else {
            // ถ้าไม่มีคิวค้างอยู่เลย
            nextMsgElement.innerText = "ไม่มี";
        }
    }
}

function displayImage(url, msg) {
    const imgElement = document.getElementById('ad-image');
    const msgElement = document.getElementById('ad-message');
    const overlay = document.getElementById('info-overlay');

    if (imgElement && url) {
        // ค่อยๆ จางออกก่อนเปลี่ยนรูป
        imgElement.style.opacity = 0;
        imgElement.src = url;
        imgElement.style.display = "block"; // 1; ค่อยๆ ปรากฏขึ้น // block แสดงรูปภาพ (เผื่อตอนแรกซ่อนไว้)
        overlay.style.display = 'flex';    //โชว์แถบข้อมูล
        msgElement.innerText = msg;
        
        setTimeout(() => {
            imgElement.src = url;
            msgElement.innerText = msg;
            imgElement.style.opacity = 1; // ค่อยๆ ปรากฏขึ้น
            overlay.style.display = 'flex';
        }, 800);
    }
}

let timerInterval; // สร้างตัวแปรเก็บ Interval ไว้ข้างนอกเพื่อสั่งหยุดได้

function startTimer(expiresAt) {
    // 1. ล้าง Interval เก่าออกก่อน (กันมันทำงานซ้อนกันจนเวลาวิ่งมั่ว)
    clearInterval(timerInterval);

    const timerElement = document.getElementById('time-left');
    const expireDate = new Date(expiresAt).getTime();

    // 2. ตั้งการทำงานซ้ำทุก 1,000 มิลลิวินาที (1 วินาที)
    timerInterval = setInterval(() => {
        const now = new Date().getTime();
        const distance = expireDate - now;

        // คำนวณ นาที และ วินาที
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // 3. แสดงผลลงในหน้าจอ
        if (distance < 0) {
            // ถ้าหมดเวลาแล้ว
            clearInterval(timerInterval);
            timerElement.innerText = "000";
            updateQueue(); // สั่งให้เช็คคิวถัดไปทันทีเมื่อหมดเวลา
        } else {
            // แสดงผลแบบ 0:00 (เติมเลข 0 ข้างหน้าถ้าเลขหลักเดียว)
            timerElement.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }
    }, 1000);
}

// ฟังก์ชันสำหรับเริ่มคิวใหม่ (เรียกใช้เมื่อของเก่าหมดเวลา)
async function checkAndStartNextQueue() {
    // หาคิวแรกที่จ่ายเงินแล้วแต่ยังไม่ได้เริ่มฉาย (started_at เป็น NULL)
    const { data: nextInLine } = await supabaseClient
        .from('ads_display')
        .select('*')
        .eq('status', 'paid')
        .is('started_at', null)
        .order('created_at', { ascending: true })
        .limit(1);

    if (nextInLine && nextInLine.length > 0) {
        const start = new Date();
        // คำนวณเวลาหมดอายุจาก duration_minutes ที่ดึงมาจาก DB
        const durationInSeconds = nextInLine[0].duration_minutes; // หรือชื่อคอลัมน์ที่คุณเปลี่ยน
        const expire = new Date(start.getTime() + durationInSeconds * 1000);
        
        // อัปเดตเวลาลง Database ทันที (คอลัมน์ในตารางจะไม่เป็น NULL แล้ว)
        const { error } = await supabaseClient
            .from('ads_display')
            .update({ 
                started_at: start.toISOString(), 
                expires_at: expire.toISOString() 
            })
            .eq('id', nextInLine[0].id);

        if (!error) {
            console.log("เริ่มคิวใหม่สำเร็จ!");
            updateQueue(); // เรียกตัวเองเพื่อแสดงผลรูปที่เพิ่งอัปเดต
        }
    } else {
        // ไม่มีคิวเหลือเลย -> ล้างหน้าจอหรือโชว์รูปพักหน้าจอ
        document.getElementById('ad-image').style.display = 'none';
        document.getElementById('ad-message').innerText = "แจกวาป ส่งรูป สแกนเลย";
        document.getElementById('time-left').innerText = "000";
        document.getElementById('info-overlay').style.display = 'none'; // ซ่อนแถบข้อมูล

        // รูป bg-image-default จะปรากฏให้เห็นเองเพราะมันอยู่ข้างหลังตลอดเวลา
    console.log("ไม่มีโฆษณา แสดงหน้าจอว่าง");
    }
}



// เรียกใช้ครั้งแรกเมื่อโหลดหน้า
    updateQueue();

 // เริ่มการฟัง (Listen) ข้อมูลที่เปลี่ยนแปลง
    const channels = supabaseClient.channel('custom-all-channel')

.on(
  'postgres_changes',
  { event: 'UPDATE', schema: 'public', table: 'ads_display' }, // ตรวจสอบชื่อตารางให้ตรง
  (payload) => {
    console.log('Change received!', payload);
    
    // ตรวจสอบว่าถ้าสถานะเปลี่ยนเป็น paid ให้แสดงรูป
    if (payload.new.status === 'paid') {
      displayImage(payload.new.image_url, payload.new.message);
    }
  }
)
.subscribe();
// เช็คคิวใหม่จาก Database ทุกๆ 5-10 วินาที
setInterval(updateQueue, 5000);

    </script>
</body>
</html>
