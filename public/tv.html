<!DOCTYPE html>
<html>
<head>
    <title>TV Display</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
    --primary-color: #ffcc00;
    --text-white: #ffffff;
    --overlay-bg: rgba(0, 0, 0, 0.6);
}
/* วิดีโอพื้นหลัง */
#bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1; /* อยู่ชั้นล่างสุด */
    object-fit: cover;
}

/* รูปโฆษณา */
#ad-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* ปรับให้เห็นรูปโฆษณาครบถ้วน */
    z-index: 10; /* อยู่เหนือวิดีโอ */
    background-color: transparent; /* สำคัญ: ต้องโปร่งใสเพื่อให้เห็นวิดีโอข้างหลัง (ถ้าต้องการ) */
     /* ซ่อนไว้ก่อน */
}

/* ปรับ Overlay ให้เด่นขึ้น */
.info-bar {
    z-index: 20; /* อยู่บนสุด */
}

body {
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: 'Kanit', sans-serif;
    overflow: hidden;
    color: var(--text-white);
}

/* พื้นที่แสดงรูปภาพหลัก */
#ad-image {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: radial-gradient(circle, #222 0%, #000 100%);
    transition: opacity 0.8s ease-in-out; /* แอนิเมชันตอนเปลี่ยนรูป */
}

/* แถบข้อมูลด้านล่าง (Glassmorphism) */
.info-bar {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    background: var(--overlay-bg);
    backdrop-filter: blur(10px); /* เอฟเฟกต์กระจกฝ้า */
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 20px 40px;
    border-radius: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.message-section {
    flex: 1;
}

#ad-message {
    font-size: 2.5rem;
    margin: 0;
    font-weight: 500;
    letter-spacing: 1px;
}

/* ตัวนับเวลาถอยหลัง */
.timer-section {
    text-align: right;
    border-left: 2px solid var(--primary-color);
    padding-left: 30px;
}

#time-left {
    font-size: 3.5rem;
    font-weight: bold;
    color: var(--primary-color);
    display: block;
    line-height: 1;
}

.label {
    font-size: 1rem;
    text-transform: uppercase;
    color: #aaa;
}

/* คิวถัดไป */
#next-queue-bar {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 1.2rem;
    border: 1px solid rgba(255,255,255,0.1);
}
 
#timer { color: #ffcc00; margin-bottom: 5px; font-weight: bold; }
#next-queue { font-size: 1rem; color: #ccc; }
    </style>
</head>
<body>


    <div id="next-queue-bar">...</div>
    <div class="info-bar" id="info-overlay">...</div>
<div id="next-queue-bar">
    <span class="label">คิวถัดไป:</span> <span id="next-msg">รอรับโฆษณา...</span>
</div>

<img id="ad-image" src="" alt="Advertising">

<div class="info-bar" id="info-overlay">
    <div class="message-section">
        <p id="ad-message">ยินดีต้อนรับ</p>
    </div>
    <div class="timer-section">
        <span class="label">เหลือเวลา</span>
        <span id="time-left">00:00</span>
    </div>
</div>

    <script>
    const SB_URL = 'https://zossrpbtdszdntgbqcfe.supabase.co';
    const SB_KEY = 'sb_publishable_7vCBrHCs7cx3uVDDT_SHJA_HVlc1xt9';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        // เริ่มการฟัง (Listen) ข้อมูลที่เปลี่ยนแปลง
const channels = supabaseClient.channel('custom-all-channel')
.on(
  'postgres_changes',
  { event: 'UPDATE', schema: 'public', table: 'ads_display' }, // ตรวจสอบชื่อตารางให้ตรง
  (payload) => {
    console.log('Change received!', payload);
    // ตรวจสอบว่าถ้าสถานะเปลี่ยนเป็น paid ให้แสดงรูป
    if (payload.new.status === 'paid') {
      displayImage(payload.new.image_url, payload.new.message);
    }
  }
)

function displayImage(url, msg) {
    const imgElement = document.getElementById('ad-image');
    const msgElement = document.getElementById('ad-message');
    const overlay = document.getElementById('info-overlay');
   

    if (imgElement && url) {
        // ค่อยๆ จางออกก่อนเปลี่ยนรูป
        imgElement.style.opacity = 0;
        
        setTimeout(() => {
            imgElement.src = url;
            msgElement.innerText = msg;
            
            // videoBg.style.opacity = '0.3';   // (ตัวเลือก) หรี่วิดีโอลงเพื่อให้โฆษณาเด่น
        }, 800);
    }
}

        let countdownInterval;

function startTimer(expiryTime) {
    // ล้าง Interval เก่าทิ้งก่อนเริ่มใหม่ เพื่อป้องกันเวลาเดินเพี้ยน
    clearInterval(countdownInterval); 

    countdownInterval = setInterval(() => {
        const now = new Date().getTime();
        const distance = new Date(expiryTime).getTime() - now;

        const timeLeftElement = document.getElementById('time-left');
        if (!timeLeftElement) return; // กันเหนียวถ้าหา Element ไม่เจอ

        if (distance < 0) {
            clearInterval(countdownInterval);
            timeLeftElement.innerText = "หมดเวลา";
            updateQueue(); // ตรวจสอบคิวถัดไปทันที
            return;
        }

        // คำนวณนาทีและวินาที
        const secondsLeft = Math.floor(distance / 1000);

        // แสดงผลในรูปแบบ 00
        timeLeftElement.innerText = `${secondsLeft} วินาที`;
    }, 1000);
}

async function updateQueue() {
    // 1. หาโฆษณาที่กำลังฉาย (มี started_at และยังไม่หมดเวลา)
    const nowIso = new Date().toISOString();
    const { data: currentAds } = await supabaseClient
        .from('ads_display')
        .select('*')
        .eq('status', 'paid')
        .lte('started_at', nowIso) // เริ่มไปแล้ว
        .gt('expires_at', nowIso)   // ยังไม่หมดอายุ
        .limit(1);

    if (currentAds && currentAds.length > 0) {
        // มีรูปกำลังฉายอยู่ -> แสดงรูปและเริ่มนับถอยหลัง
        displayImage(currentAds[0].image_url, currentAds[0].message);
        startTimer(currentAds[0].expires_at);
    } else {
        // ไม่มีรูปฉายอยู่ หรือรูปเก่าหมดเวลาแล้ว -> ไปดึงคิวใหม่มาเริ่ม
        checkAndStartNextQueue();
    }
}

async function checkAndStartNextQueue() {
    // หาคิวแรกที่จ่ายเงินแล้วแต่ยังไม่ได้เริ่มฉาย (started_at เป็น NULL)
    const { data: nextInLine } = await supabaseClient
        .from('ads_display')
        .select('*')
        .eq('status', 'paid')
        .is('started_at', null)
        .order('created_at', { ascending: true })
        .limit(1);

    if (nextInLine && nextInLine.length > 0) {
        const start = new Date();
        // คำนวณเวลาหมดอายุจาก duration_minutes ที่ดึงมาจาก DB
        const duration = nextInLine[0].duration_minutes || 10; // ถ้าไม่มีค่าให้ default 10 นาที
        const expire = new Date(start.getTime() + duration * 1000);
        
        // อัปเดตเวลาลง Database ทันที (คอลัมน์ในตารางจะไม่เป็น NULL แล้ว)
        const { error } = await supabaseClient
            .from('ads_display')
            .update({ 
                started_at: start.toISOString(), 
                expires_at: expire.toISOString() 
            })
            .eq('id', nextInLine[0].id);

        if (!error) {
            console.log("เริ่มคิวใหม่สำเร็จ!");
            updateQueue(); // เรียกตัวเองเพื่อแสดงผลรูปที่เพิ่งอัปเดต
        }
    } else {
    // ไม่มีคิวเหลือเลย
    document.getElementById('ad-image').style.display = 'none'; // ซ่อนรูปโฆษณา
    document.getElementById('info-overlay').style.display = 'none'; // ซ่อนแถบข้อมูล
    
    const videoBg = document.getElementById('bg-video');
    if(videoBg) videoBg.style.opacity = '1'; // ให้วิดีโอสว่างปกติ
    }
}
    
// สั่งให้ทำงานทุกครั้งที่มีการอัปเดตข้อมูล
supabaseClient.channel('custom-all-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ads_display' }, () => {
        updateQueue();
    })
    .subscribe();

// เรียกใช้ครั้งแรกเมื่อโหลดหน้า
updateQueue();
    </script>

</body>
</html>
