<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งรูปขึ้นจอ TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 15px; text-align: center; color: #666; font-size: 14px; }
        #qr-container { display: none; text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        img#qr-image { width: 200px; height: 200px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📺 ส่งข้อมูลขึ้นจอ TV</h2>
    
    <div class="form-group">
        <label>1. เลือกรูปภาพ</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="form-group">
        <label>2. ข้อความที่ต้องการแสดง</label>
        <input type="text" id="messageInput" placeholder="พิมพ์ข้อความที่นี่...">
    </div>

    <div class="form-group">
        <label>3. เลือกเวลาแสดงผล</label>
        <select id="durationInput">
            <option value="10">10 นาที (20 บาท)</option>
            <option value="30">30 นาที (50 บาท)</option>
            <option value="60">1 ชั่วโมง (90 บาท)</option>
        </select>
    </div>

    <button onclick="startProcess()">ชำระเงินและส่งรูป</button>

    <div id="status">กรุณากรอกข้อมูลให้ครบถ้วน</div>

    <div id="qr-container">
        <h3>สแกนเพื่อจ่ายเงิน</h3>
        <p>ยอดชำระ: <span id="amount-text">0</span> บาท</p>
        <img src="" id="qr-image" alt="QR Code">
        <p style="color: red; font-size: 12px;">รูปจะขึ้นจอทันทีหลังจากชำระเงินสำเร็จ</p>
    </div>
</div>

<script>
    // ใส่ค่าจริงจาก Supabase ของคุณที่นี่
    const SUPABASE_URL = 'https://zossrpbtdszdntgbqcfe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7vCBrHCs7cx3uVDDT_SHJA_HVlc1xt9';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function startProcess() {
        const fileInput = document.getElementById('imageInput');
        const message = document.getElementById('messageInput').value;
        const duration = document.getElementById('durationInput').value;
        const statusText = document.getElementById('status');

        if (!fileInput.files[0] || !message) {
            alert('กรุณาเลือกรูปและใส่ข้อความด้วยครับ');
            return;
        }

        statusText.innerText = "กำลังอัปโหลดรูป...";

        // 1. อัปโหลดรูปไปที่ Supabase Storage
        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        const { data: storageData, error: storageError } = await supabase.storage
            .from('ads-images') // ชื่อ Bucket ที่คุณสร้างไว้
            .upload(fileName, file);

        if (storageError) {
            statusText.innerText = "อัปโหลดรูปไม่สำเร็จ: " + storageError.message;
            return;
        }

        // 2. ดึง Public URL ของรูป
        const { data: urlData } = supabase.storage.from('ads-images').getPublicUrl(fileName);
        const imageUrl = urlData.publicUrl;

        // 3. บันทึกข้อมูลลงตาราง (สถานะ pending)
        const { data: adData, error: dbError } = await supabase
            .from('ads_display')
            .insert([{ 
                image_url: imageUrl, 
                message: message, 
                duration_minutes: parseInt(duration),
                status: 'pending' 
            }])
            .select()
            .single();

        if (dbError) {
            statusText.innerText = "เกิดข้อผิดพลาดในการบันทึกข้อมูล";
            return;
        }

        // 4. แสดง QR Code (ในขั้นตอนนี้เราจำลองการดึง QR จาก Backend)
        statusText.innerText = "สร้างรายการสำเร็จ!";
        showQR(adData.id, duration);
    }

    function showQR(adId, duration) {
        document.getElementById('qr-container').style.display = 'block';
        document.getElementById('amount-text').innerText = (duration == 10 ? 20 : duration == 30 ? 50 : 90);
        
        // ตรงนี้ในระบบจริง คุณต้องเรียก API /api/generate-qr ของคุณ
        // แต่เพื่อการทดสอบ ให้ลองนึกภาพว่ามันโชว์ QR ของคุณที่นี่
        document.getElementById('qr-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=TEST_PAYMENT_" + adId;
    }
</script>

</body>
</html>
